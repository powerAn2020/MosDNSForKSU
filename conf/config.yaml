log:
  level: warn
  file: "/data/adb/mosdns/run/mosdns.log"

api:
  http: "127.0.0.1:8338"

include:
  - "/data/adb/mosdns/conf/dat_exec.yaml"
  - "/data/adb/mosdns/conf/dns.yaml"

plugins:
  ################ 预处理序列 ################
  - tag: reject_qtype65
    type: sequence
    args:
      - exec: query_summary reject_qtype65
      - exec: reject 3

  - tag: reject_null_domain
    type: sequence
    args:
      - exec: query_summary reject_null_domain
      - exec: reject 3

  - tag: reject_ad
    type: sequence
    args:
      - exec: query_summary reject_adlist
      - exec: reject 3

  ################ Fallback 组 ################
  - tag: dns_nocn
    type: "fallback"
    args:
      primary: google
      secondary: cloudflare
      threshold: 600
      always_standby: true

  - tag: dns_cn
    type: "fallback"
    args:
      primary: ali
      secondary: dnspod
      threshold: 600
      always_standby: true

  ################ 日志序列 ################
  - tag: dns_nocn_seq
    type: sequence
    args:
      - exec: query_summary dns_nocn
      - exec: $dns_nocn

  - tag: dns_cn_seq
    type: sequence
    args:
      - exec: query_summary dns_cn
      - exec: $dns_cn

  - tag: local_seq
    type: sequence
    args:
      - exec: query_summary local
      - exec: $local

  - tag: fallback_seq
    type: sequence
    args:
      - exec: query_summary fallback
      - exec: $dns_nocn

  - tag: forward_remote_seq
    type: sequence
    args:
      - exec: query_summary forward_remote
      - exec: $forward_remote

  - tag: other_seq
    type: sequence
    args:
      - exec: query_summary other
      - exec: $dns_cn

  ################ 查询处理序列 ################

  # query_cn: 国内域名查询
  - tag: query_cn
    type: sequence
    args:
      - exec: $ecs_cn
      - exec: $dns_cn_seq
      - matches: "resp_ip 61.160.148.90/24 221.228.32.13/24 114.237.67.59/24 117.69.71.58/24 180.109.0.0/16 4.36.66.178 8.7.198.45 37.61.54.158 46.82.174.68 59.24.3.173 64.33.88.161 78.16.49.15 93.46.8.89 159.106.121.75 202.106.1.2 202.181.7.85 203.161.230.171 209.145.54.50 211.94.66.147 216.234.179.13 243.185.187.39"
        exec: drop_resp

  # query_nocn: 非中国域名查询（经本地代理）
  - tag: query_nocn
    type: sequence
    args:
      - exec: $no_ecs
      - exec: $forward_remote_seq
      - matches: "resp_ip $geoip_cn 61.160.148.90/24 221.228.32.13/24 114.237.67.59/24 117.69.71.58/24 180.109.0.0/16 4.36.66.178 8.7.198.45 37.61.54.158 46.82.174.68 59.24.3.173 64.33.88.161 78.16.49.15 93.46.8.89 159.106.121.75 202.106.1.2 202.181.7.85 203.161.230.171 209.145.54.50 211.94.66.147 216.234.179.13 243.185.187.39"
        exec: drop_resp

  # query_fallback: 未知域名（严格走境外）
  - tag: query_fallback
    type: sequence
    args:
      - exec: $no_ecs
      - exec: $fallback_seq
      - matches: "resp_ip $geoip_cn 61.160.148.90/24 221.228.32.13/24 114.237.67.59/24 117.69.71.58/24 180.109.0.0/16 4.36.66.178 8.7.198.45 37.61.54.158 46.82.174.68 59.24.3.173 64.33.88.161 78.16.49.15 93.46.8.89 159.106.121.75 202.106.1.2 202.181.7.85 203.161.230.171 209.145.54.50 211.94.66.147 216.234.179.13 243.185.187.39"
        exec: drop_resp

  # query_lan: 局域网查询
  - tag: query_lan
    type: sequence
    args:
      - exec: $cache_lan
      - matches: has_resp
        exec: return
      - exec: $local_seq

  # query_other: PTR/ANY 等特殊查询
  - tag: query_other
    type: sequence
    args:
      - exec: $no_ecs
      - exec: $other_seq

  ################ 结果处理 ################
  - tag: pre_handle
    type: sequence
    args:
      - exec: $ttl_1h
      - exec: accept

  - tag: main_handle
    type: sequence
    args:
      - exec: $ttl_5m
      - exec: accept

  - tag: has_resp_pre
    type: sequence
    args:
      - matches: has_resp
        exec: goto pre_handle

  - tag: has_resp_main
    type: sequence
    args:
      - matches: has_resp
        exec: goto main_handle

  ################ pre_sequence 预处理 ################
  - tag: pre_sequence
    type: sequence
    args:
      - matches: qtype 65
        exec: $reject_qtype65
      - matches: "qname keyword:::"
        exec: $reject_null_domain
      - matches: qname $geosite_ads
        exec: $reject_ad
      - matches: qtype 12
        exec: $query_other
      - matches: qtype 255
        exec: $query_other
      - matches: ptr_ip $geoip_private
        exec: $query_lan
      - exec: jump has_resp_pre

  ################ main_sequence 主分流 ################
  # 优先级: GFW → 白名单 → 非CN → CN → Fallback
  - tag: main_sequence
    type: sequence
    args:
      - exec: $cache_wan
      - exec: jump has_resp_main
      # 1. GFW 域名 → 境外
      - matches: qname $geosite_gfw
        exec: $query_nocn
      - exec: jump has_resp_main
      # 2. CN 域名 + 白名单 → 国内
      - matches: qname $geosite_cn
        exec: $query_cn
      - exec: jump has_resp_main
      # 3. 非CN域名 → 境外
      - matches: qname $geosite_nocn
        exec: $query_nocn
      - exec: jump has_resp_main
      # 4. 未知域名 → Fallback（严格走境外）
      - exec: $no_ecs
      - exec: $query_fallback
      - exec: jump has_resp_main

  ################ 入口序列 ################
  - tag: sequence
    type: sequence
    args:
      - exec: metrics_collector metrics
      - exec: $pre_sequence
      - exec: $main_sequence

  ################ 服务器 ################
  - type: udp_server
    args:
      entry: sequence
      listen: ":5335"
  - type: tcp_server
    args:
      entry: sequence
      listen: ":5335"
